version: 2

models:
  - name: dim_companies
    description: >
      Dimensão que representa as empresas cadastradas na plataforma.
      Contém atributos descritivos utilizados para segmentação e análise
      do comportamento de uso por empresa.

    meta:
      domain: companies
      layer: silver
      owner: data_team
      contains_pii: false
      dimension_type: slowly_changing_dimension
      scd_type: type_1

    columns:
      - name: company_id
        description: Identificador único da empresa.
        tests:
          - not_null
          - unique
        meta:
          pii: false

      - name: company_name
        description: Nome da empresa.
        meta:
          pii: false
          sensitive: business_information

      - name: industry
        description: Segmento ou indústria da empresa.
        meta:
          pii: false

      - name: employee_count
        description: Quantidade de funcionários da empresa.
        meta:
          pii: false