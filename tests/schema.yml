version: 2

models:
  - name: fact_bookings
    columns:
      - name: booking_id
        tests:
          - not_null
          - unique

      - name: company_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_companies')
              field: company_id

      - name: plan_id
        tests:
          - relationships:
              to: ref('dim_plans')
              field: plan_id

      - name: status_id
        tests:
          - accepted_values:
              values: [1, 2, 3, 4]  # exemplo

  - name: dim_spaces
    columns:
      - name: space_id
        tests:
          - not_null
          - unique